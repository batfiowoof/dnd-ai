services:

  # ── PostgreSQL + pgvector ─────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: dnd-postgres
    environment:
      POSTGRES_DB: dndai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5555:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Kafka (KRaft — no Zookeeper) ──────────────────
  kafka:
    image: apache/kafka:3.7.0
    container_name: dnd-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    ports:
      - "9092:9092"

  # ── Keycloak (OAuth2 / OIDC provider) ─────────────
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: dnd-keycloak
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    command: start-dev --http-port=8180
    ports:
      - "8180:8180"

  # ── Ollama (LLM inference) ────────────────────────
  # After first start, pull the model:
  #   docker exec -it dnd-ollama ollama pull llama3.2
  ollama:
    image: ollama/ollama:latest
    container_name: dnd-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  postgres_data:
  ollama_data:
