# Pin the project name so it no longer depends on the folder name.
# (The repo was moved to a new directory; without this, Compose would rename
# the project, orphan the old containers, and create empty data volumes.)
name: dnd-ai

services:

  # ── PostgreSQL + pgvector ─────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: dnd-postgres
    environment:
      POSTGRES_DB: dndai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5555:5432"
    # Let Postgres finish its shutdown checkpoint on `compose stop/down`; the
    # default 10s timeout was killing it mid-checkpoint, forcing crash recovery
    # (the slow ~30s fsync) on the next boot.
    stop_grace_period: 60s
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5
      # First boot on a slow disk does a ~30s fsync + crash recovery before
      # accepting connections; without a start_period those count as failures
      # and dependents (backend) abort with "container is unhealthy".
      start_period: 90s

  # ── Kafka (KRaft — no Zookeeper) ──────────────────
  kafka:
    image: apache/kafka:3.7.0
    container_name: dnd-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    ports:
      - "9092:9092"
    healthcheck:
      test: [ "CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1" ]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 45s

  # ── Keycloak (OAuth2 / OIDC provider) ─────────────
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: dnd-keycloak
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    command: start-dev --http-port=8180 --import-realm
    ports:
      - "8180:8180"
    volumes:
      - ./keycloak/dnd-ai-realm.json:/opt/keycloak/data/import/dnd-ai-realm.json:ro
      - ./keycloak/themes:/opt/keycloak/themes:ro

  # ── Ollama (LLM inference) ────────────────────────
  # Inference runs on the HOST's Ollama (not a container), so models you've
  # already pulled on your machine are used directly. The backend reaches it
  # via host.docker.internal. First-run, on the HOST:
  #   ollama pull qwen3.5:4b
  #   ollama pull bge-m3
  # (Ensure host Ollama listens on 0.0.0.0 — set OLLAMA_HOST=0.0.0.0 if needed.)

  # ── Backend (Spring Boot) ─────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dnd-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/dndai
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_AI_OLLAMA_BASE_URL: http://host.docker.internal:11434
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8180/realms/dnd-ai/protocol/openid-connect/certs
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://localhost:8180/realms/dnd-ai
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  # ── Frontend (Next.js) ────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        BACKEND_URL: http://backend:8080
        NEXT_PUBLIC_KEYCLOAK_URL: http://localhost:8180
    container_name: dnd-frontend
    environment:
      BACKEND_URL: http://backend:8080
      NEXT_PUBLIC_KEYCLOAK_URL: http://localhost:8180
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
