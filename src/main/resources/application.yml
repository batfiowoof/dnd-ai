server:
  port: 8080

spring:
  application:
    name: dnd-ai

  # ── PostgreSQL ──────────────────────────────────────
  datasource:
    url: jdbc:postgresql://localhost:5555/dndai
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false
    open-in-view: false

  # ── Flyway ──────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration

  # ── Kafka ───────────────────────────────────────────
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.dungeon.master.kafka.event
        spring.json.use.type.headers: true
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

  # ── Spring AI (cloud chat + local embeddings) ───────
  ai:
    # Both the OpenAI and Ollama starters are on the classpath. These selectors pick which
    # provider's auto-config serves each model type, so there's exactly one ChatModel and one
    # EmbeddingModel bean: chat → OpenAI (pointed at OpenRouter), embeddings → Ollama (bge-m3).
    model:
      chat: openai
      embedding: ollama
    # Chat model runs in the cloud via OpenRouter (OpenAI-compatible). Old hardware can't run
    # the chat model locally; OpenRouter gives free/near-cost access to many models.
    openai:
      base-url: https://openrouter.ai/api/v1
      api-key: ${OPENROUTER_API_KEY}
      chat:
        options:
          # Prefer a non-reasoning *instruct* model: reasoning models can emit a <think> block
          # instead of narration (which once returned an empty visible reply). Swapping models
          # later is a one-string change. Free tier has rate limits (~20 req/min, ~200 req/day);
          # switch to a cheap paid model here if you hit them.
          model: meta-llama/llama-3.3-70b-instruct:free
          temperature: 0.7
          top-p: 0.9
    ollama:
      base-url: http://localhost:11434
      # Embeddings stay local — light (~0.2 s/query on CPU) and keeps the seeded bge-m3 corpus
      # valid (no re-seed, no migration). Local Ollama only needs `ollama pull bge-m3`.
      embedding:
        options:
          model: bge-m3
          # Run the embedder on CPU (0 GPU layers).
          num-gpu: 0
          # Keep the embedder resident so it isn't reloaded every turn.
          keep-alive: 30m
    vectorstore:
      pgvector:
        dimensions: 1024
        index-type: ivfflat
        distance-type: cosine_distance

  # ── Security (OAuth2 JWT) ───────────────────────────
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8180/realms/dnd-ai

# ── D&D AI app settings ─────────────────────────────
dnd:
  rag:
    # Seed the bundled SRD 5.1 reference (conditions, spells, monster lore) into pgvector on
    # startup so the DM can retrieve rules text for grounded narration. Idempotent + fail-soft.
    seed-srd: true

# ── Resilience4j ────────────────────────────────────
resilience4j:
  circuitbreaker:
    instances:
      aiService:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        minimum-number-of-calls: 5
        register-health-indicator: true
  timelimiter:
    instances:
      aiService:
        # Applies to the reactive/streaming path; local models can run long.
        timeout-duration: 120s

# ── Actuator ────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,circuitbreakers,circuitbreakerevents
  endpoint:
    health:
      show-details: when-authorized

# ── WebSocket ───────────────────────────────────────
websocket:
  allowed-origins: http://localhost:3000,http://localhost:5173

# ── Logging ─────────────────────────────────────────
logging:
  level:
    com.dungeon.master: DEBUG
    org.springframework.messaging: INFO
    org.apache.kafka: WARN
