server:
  port: 8080

spring:
  application:
    name: dnd-ai

  # ── PostgreSQL ──────────────────────────────────────
  datasource:
    url: jdbc:postgresql://localhost:5555/dndai
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false
    open-in-view: false

  # ── Flyway ──────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration

  # ── Kafka ───────────────────────────────────────────
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.dungeon.master.kafka.event
        spring.json.use.type.headers: true
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

  # ── Spring AI (Ollama) ──────────────────────────────
  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        options:
          # qwen3.5:4b is a reasoning model: it can emit a <think> block instead of narration
          # (which once returned an empty visible reply). If the DM comes back blank, suppress
          # thinking — e.g. append "/no_think" to the system prompt in DmAiService.
          model: qwen3.5:4b
          temperature: 0.7
          top-p: 0.9
          # Tight context (4096) keeps the attention compute buffer small with Flash Attention
          # off; with the embedder on CPU (below) the whole GPU is free for the chat model.
          num-ctx: 4096
          # Keep the model resident between turns. Without this the app unloads it right after
          # each reply, so every turn pays the full reload-from-disk cost. 30m stays warm through
          # a session and releases when idle (so it doesn't hold ~5 GB of VRAM forever).
          keep-alive: 30m
      embedding:
        options:
          model: bge-m3
          # Run the embedder on CPU (0 GPU layers) so all VRAM is free for the chat model.
          # Runtime only embeds one short query per turn (~0.2 s on CPU) — the heavy one-time
          # corpus seed already ran. Frees ~1 GB of VRAM.
          num-gpu: 0
          # Keep the embedder resident too, so it isn't reloaded every turn.
          keep-alive: 30m
    vectorstore:
      pgvector:
        dimensions: 1024
        index-type: ivfflat
        distance-type: cosine_distance

  # ── Security (OAuth2 JWT) ───────────────────────────
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8180/realms/dnd-ai

# ── D&D AI app settings ─────────────────────────────
dnd:
  rag:
    # Seed the bundled SRD 5.1 reference (conditions, spells, monster lore) into pgvector on
    # startup so the DM can retrieve rules text for grounded narration. Idempotent + fail-soft.
    seed-srd: true

# ── Resilience4j ────────────────────────────────────
resilience4j:
  circuitbreaker:
    instances:
      aiService:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        minimum-number-of-calls: 5
        register-health-indicator: true
  timelimiter:
    instances:
      aiService:
        # Applies to the reactive/streaming path; local models can run long.
        timeout-duration: 120s

# ── Actuator ────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,circuitbreakers,circuitbreakerevents
  endpoint:
    health:
      show-details: when-authorized

# ── WebSocket ───────────────────────────────────────
websocket:
  allowed-origins: http://localhost:3000,http://localhost:5173

# ── Logging ─────────────────────────────────────────
logging:
  level:
    com.dungeon.master: DEBUG
    org.springframework.messaging: INFO
    org.apache.kafka: WARN
