server:
  port: 8080

spring:
  application:
    name: dnd-ai

  # ── PostgreSQL ──────────────────────────────────────
  datasource:
    url: jdbc:postgresql://localhost:5555/dndai
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false
    open-in-view: false

  # ── Flyway ──────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration

  # ── Kafka ───────────────────────────────────────────
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.dungeon.master.kafka.event
        spring.json.use.type.headers: true
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

  # ── Spring AI (Ollama) ──────────────────────────────
  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        options:
          model: qwen3.5:4b
          temperature: 0.8
          top-p: 0.9
      embedding:
        options:
          model: bge-m3
    vectorstore:
      pgvector:
        dimensions: 1024
        index-type: ivfflat
        distance-type: cosine_distance

  # ── Security (OAuth2 JWT) ───────────────────────────
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8180/realms/dnd-ai

# ── Resilience4j ────────────────────────────────────
resilience4j:
  circuitbreaker:
    instances:
      aiService:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        minimum-number-of-calls: 5
        register-health-indicator: true
  timelimiter:
    instances:
      aiService:
        # Applies to the reactive/streaming path; local models can run long.
        timeout-duration: 120s

# ── Actuator ────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,circuitbreakers,circuitbreakerevents
  endpoint:
    health:
      show-details: when-authorized

# ── WebSocket ───────────────────────────────────────
websocket:
  allowed-origins: http://localhost:3000,http://localhost:5173

# ── Logging ─────────────────────────────────────────
logging:
  level:
    com.dungeon.master: DEBUG
    org.springframework.messaging: INFO
    org.apache.kafka: WARN
