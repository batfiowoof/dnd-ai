server:
  port: 8080

spring:
  application:
    name: dnd-ai

  # ── PostgreSQL ──────────────────────────────────────
  datasource:
    url: jdbc:postgresql://localhost:5555/dndai
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false
    open-in-view: false

  # ── Flyway ──────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration

  # ── Kafka ───────────────────────────────────────────
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.dungeon.master.kafka.event
        spring.json.use.type.headers: true
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

  # ── HTTP client (used by Spring AI's blocking OpenAI/OpenRouter calls) ───────
  # The World Builder generators use a blocking .call(); the largest (a full quest array) is slow
  # on a free OpenRouter model — measured ~11 tok/s, so a ~2k-token batch takes ~190s and has been
  # seen to reach 4–5 min. The read timeout must clear that worst case or the socket is cut just
  # before the (valid) response arrives and nothing reaches the wizard. The real cure for the wait
  # is a faster chat model (spring.ai.openai.chat.options.model) — this is the safety margin.
  http:
    client:
      connect-timeout: 30s
      read-timeout: 360s

  # ── Spring AI (cloud chat + local embeddings) ───────
  ai:
    # Both the OpenAI and Ollama starters are on the classpath. These selectors pick which
    # provider's auto-config serves each model type, so there's exactly one ChatModel and one
    # EmbeddingModel bean: chat → OpenAI (pointed at OpenRouter), embeddings → Ollama (bge-m3).
    model:
      chat: openai
      embedding: ollama
    # Chat model runs in the cloud via OpenRouter (OpenAI-compatible). Old hardware can't run
    # the chat model locally; OpenRouter gives free/near-cost access to many models.
    openai:
      # NOTE: no trailing /v1 — Spring AI appends its completions path (/v1/chat/completions).
      # Using .../api/v1 here produces a doubled .../api/v1/v1/chat/completions → 404.
      base-url: https://openrouter.ai/api
      api-key: ${OPENROUTER_API_KEY}
      chat:
        options:
          # Prefer a non-reasoning *instruct* model: reasoning models can emit a <think> block
          # instead of narration (which once returned an empty visible reply). Swapping models
          # later is a one-string change. Free tier has rate limits (~20 req/min, ~200 req/day);
          # switch to a cheap paid model here if you hit them.
          model: google/gemma-4-31b-it
          temperature: 0.7
          top-p: 0.9
          # Ceiling so the largest structured generations (a full quest array) can't be truncated
          # mid-JSON — a cut-off reply is unparseable. Does not otherwise change narration behaviour.
          max-tokens: 4096
    ollama:
      base-url: http://localhost:11434
      # Embeddings stay local — light (~0.2 s/query on CPU) and keeps the seeded bge-m3 corpus
      # valid (no re-seed, no migration). Local Ollama only needs `ollama pull bge-m3`.
      embedding:
        options:
          model: bge-m3
          # Run the embedder on CPU (0 GPU layers).
          num-gpu: 0
          # Keep the embedder resident so it isn't reloaded every turn.
          keep-alive: 30m
    vectorstore:
      pgvector:
        dimensions: 1024
        index-type: ivfflat
        distance-type: cosine_distance

  # ── File uploads (battle-map backgrounds) ───────────
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB

  # ── Security (OAuth2 JWT) ───────────────────────────
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8180/realms/dnd-ai

# ── App-specific settings ───────────────────────────
app:
  uploads:
    # Directory (relative to the working dir, or absolute) where uploaded battle-map images
    # are stored and served from under /uploads/**.
    dir: ./uploads

# ── D&D AI app settings ─────────────────────────────
dnd:
  rag:
    # Seed the bundled SRD 5.1 reference (conditions, spells, monster lore) into pgvector on
    # startup so the DM can retrieve rules text for grounded narration. Idempotent + fail-soft.
    seed-srd: true

# ── Resilience4j ────────────────────────────────────
# DmAiService.streamToString already retries transient cloud errors (429/5xx) with backoff,
# so the breaker should trip only on SUSTAINED outages and recover quickly.
resilience4j:
  circuitbreaker:
    instances:
      aiService:
        sliding-window-size: 20
        failure-rate-threshold: 50
        wait-duration-in-open-state: 15s # cloud recovers fast; was 30s (local-era)
        permitted-number-of-calls-in-half-open-state: 3
        minimum-number-of-calls: 8 # don't open on one or two transient blips
        register-health-indicator: true
  # NOTE: no timelimiter here — resilience4j time limiting only wraps reactive / CompletableFuture
  # returns, and DmAiService methods return String, so it never applied. The in-call retry and the
  # circuit breaker govern latency/failures instead.

# ── Actuator ────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,circuitbreakers,circuitbreakerevents
  endpoint:
    health:
      show-details: when-authorized

# ── WebSocket ───────────────────────────────────────
websocket:
  allowed-origins: http://localhost:3000,http://localhost:5173

# ── Logging ─────────────────────────────────────────
logging:
  level:
    com.dungeon.master: DEBUG
    org.springframework.messaging: INFO
    org.apache.kafka: WARN
